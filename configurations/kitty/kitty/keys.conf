# Leader: Ctrl+b (Kitty sequential maps via ctrl+b>key)

# --- tmux-like bindings ---

# rename session
map ctrl+b>period    rename_session

# rename tab
map ctrl+b>comma     set_tab_title

# splits (must use splits layout; hsplit/vsplit are ignored otherwise)
# "-" = horizontal split (stacked), "shift+\" = vertical split (side-by-side)
map ctrl+b>minus            combine : goto_layout splits : split_stack
map ctrl+b>shift+backslash  combine : goto_layout splits : split_side

# tabs / panes
map ctrl+b>c        new_tab_default
map ctrl+b>x        close_window
map ctrl+b>z        toggle_maximized
map ctrl+b>n        next_tab
map ctrl+b>p        previous_tab

# pane navigation
map ctrl+b>h        neighboring_window left
map ctrl+b>j        neighboring_window down
map ctrl+b>k        neighboring_window up
map ctrl+b>l        neighboring_window right
map ctrl+b>space    move_window_forward

# pane select / swap
map ctrl+b>shift+J        focus_visible_window
map ctrl+b>shift+K        swap_with_window

# copy mode
map ctrl+b>enter    show_scrollback

# --- custom keys ---

# zoxide workspace/session switcher
map ctrl+shift+p    workspace_switcher

# flashlight / QuickSelect (copy match to clipboard)
map ctrl+b>f        kitten hints --type word --program @

# tab navigator
map ctrl+b>w        select_tab

# copy / scrollback mode
map ctrl+b>v        show_scrollback

# search in scrollback
map ctrl+b>/        search_scrollback

# quit pane / quit app
map ctrl+b>q              close_window
map ctrl+b>shift+Q        combine : save_sessions : quit

# Save sessions and show a notification
map ctrl+b>shift+Y        combine : save_sessions : kitten notify "Sessions saved"

# fullscreen
map ctrl+b>z        toggle_layout stack

# font size (no leader)
map ctrl+shift+k    change_font_size all +1.0
map ctrl+shift+j    change_font_size all -1.0
map ctrl+shift+l    change_font_size all 0
