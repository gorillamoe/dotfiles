include themes/vhs-era.conf
include keys.conf

# Fonts
font_family      MapleMono
bold_font        MapleMono Bold
italic_font      MapleMono Italic
bold_italic_font MapleMono Bold Italic
font_size        14.0
adjust_line_height 100%

# Cursor trail
cursor_trail 1

# Window
initial_window_width  80c
initial_window_height 25c
remember_window_size  yes
hide_window_decorations titlebar-only

# Display
linux_display_server wayland
inactive_text_alpha  0.4

# Leader / session tooling
map_timeout          5.0
allow_remote_control yes

# Scrollback pager: Neovim 0.12+ terminal buffer with ANSI colors
scrollback_pager /bin/zsh -c "DISABLE_KIKAO_NVIM=1 exec nvim --cmd 'set eventignore=FileType laststatus=0 cmdheight=0 showtabline=0' +'nnoremap q ZQ' +'tnoremap <Esc> <C-\><C-n>' +'call nvim_open_term(0, {})' +'set nomodified nolist laststatus=0 cmdheight=0 showtabline=0 noruler' +'autocmd VimEnter * ++once set laststatus=0 cmdheight=0 showtabline=0' +'$' -"

# Split helpers (tmux-like leader keys)
# hsplit/vsplit only work in the "splits" layout; combine switches first.
action_alias split_side launch --type=window --cwd=current --location=vsplit --title default --add-to-session .
action_alias split_stack launch --type=window --cwd=current --location=hsplit --title default --add-to-session .
action_alias new_tab_default combine : new_tab_with_cwd : set_tab_title default
action_alias save_sessions save_as_session --save-only --match=session:. .
action_alias workspace_switcher launch --type=overlay --allow-remote-control python3 ${HOME}/.config/kitty/bin/workspace_switcher.py
action_alias rename_session launch --type=overlay --allow-remote-control python3 ${HOME}/.config/kitty/bin/rename_session.py

watcher ${HOME}/.config/kitty/watcher.py

# Tab bar (tabline plugin approximation)
tab_bar_edge         top
tab_bar_min_tabs     1
tab_bar_style        custom
tab_powerline_style  slanted
tab_bar_filter       session:.
tab_title_template   {title}
active_tab_font_style   bold
inactive_tab_font_style normal
confirm_os_window_close 1
