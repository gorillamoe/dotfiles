---
configurations:
  # halloy irc client configuration
  - name: halloy
    files:
      - source: halloy
        destination: $HOME/.config/halloy
  # wallpaper
  - name: pictures
    files:
      - source: wallpaper.jpg
        destination: $HOME/Pictures/wallpaper.jpg
      - source: wallpaper.webp
        destination: $HOME/Pictures/wallpaper.webp
      - source: avatar.png
        destination: $HOME/Pictures/avatar.png
  # sane defaults for editorconfig
  - name: editorconfig
    files:
      - source: .editorconfig
        destination: $HOME/.editorconfig
  # My scripts
  - name: scripts
    files:
      - source: scripts
        destination: $HOME/.local/scripts
  # mise configuration
  - name: mise
    files:
      - source: mise
        destination: $HOME/.config/mise
  # zsh configuration
  - name: zsh
    files:
      - source: .zshrc
        destination: $HOME/.zshrc
  # oh my posh configuration
  - name: oh-my-posh
    files:
      - source: oh-my-posh
        destination: $HOME/.config/oh-my-posh
  # sane defaults for git
  - name: git
    files:
      - source: .gitconfig
        destination: $HOME/.gitconfig
      - source: work/.gitconfig
        destination: $HOME/projects/work/.gitconfig
  # sane defaults for jj
  - name: jj
    files:
      - source: jj
        destination: $HOME/.config/jj
  # sane defaults for wezterm
  - name: wezterm
    files:
      - source: wezterm
        destination: $HOME/.config/wezterm
  # sane defaults for ssh
  - name: ssh
    files:
      - source: .ssh/config
        destination: $HOME/.ssh/config
  # Zana 🌈 package manager 📦 configuration
  - name: zana
    files:
      - source: zana
        destination: $HOME/.config/zana
  # Vale linter configuration
  - name: vale
    files:
      - source: .vale
        destination: $HOME/.vale
      - source: vale.ini
        destination: $HOME/vale.ini
